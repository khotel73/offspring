<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연락처 - 표</title>
    
    <!-- 🚨 무단 침입 방지 코드 시작 🚨 -->
    <script>
        // 브라우저에 'isLoggedIn' 이라는 출입증이 없으면
        if (sessionStorage.getItem("isLoggedIn") !== "true") {
            alert("⛔ 잘못된 접근입니다. 비밀번호를 먼저 입력해주세요!");
            window.location.href = "index.html"; // 강제로 로그인 화면으로 이동
        }
    </script>
    <!-- 🚨 무단 침입 방지 코드 끝 🚨 -->
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { display: flex; flex-direction: column; align-items: center; min-height: 100dvh; padding: 30px 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: #333; }
        .box { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 16px; padding: 30px 20px; width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); }
        h1 { font-size: clamp(1.8rem, 6vw, 2.5rem); margin-bottom: 10px; color: #2c3e50; text-align: center; }
        p.subtitle { font-size: 1rem; color: #666; text-align: center; margin-bottom: 20px; }
        .table-container { width: 100%; max-height: 60vh; overflow-y: auto; border-radius: 8px; border: 1px solid #ddd; background: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #ddd; text-align: center; font-size: 0.95rem; }
        th { background-color: #2c3e50; color: white; position: sticky; top: 0; z-index: 1; }
        tr:hover { background-color: #f4f6f8; }
        td:first-child { font-weight: bold; background-color: #fafafa; width: 30%; }
        .loading { text-align: center; padding: 20px; color: #666; font-weight: bold; }
        
        /* 📞 전화번호 링크 예쁘게 꾸미기 */
        .tel-link {
            color: #0056b3; /* 누를 수 있게 파란색 계열로 표시 */
            text-decoration: none; /* 밑줄 제거 */
            font-weight: bold;
            display: block; /* 터치 영역을 넓혀줌 */
            padding: 5px;
        }
        .tel-link:hover {
            text-decoration: underline; /* 마우스 올렸을 때 밑줄 */
            color: #003d82;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>📊 상세 데이터</h1>
        <p class="subtitle">Cloudflare D1에서 실시간으로 가져온 데이터입니다.</p>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>번호</th>
                        <th>내용</th>
                        <th>Tel</th>
                    </tr>
                </thead>
                <!-- 안의 내용을 비워두고, 자바스크립트로 채웁니다 -->
                <tbody id="table-body">
                    <!-- 열이 3개이므로 colspan을 3으로 맞췄습니다 -->
                    <tr><td colspan="3" class="loading">데이터를 불러오는 중입니다...⏳</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        // 화면이 켜지자마자 API에서 데이터를 가져오는 함수
        async function loadData() {
            try {
                // 아까 만든 3단계의 길(API)을 통해 데이터를 요청합니다.
                const response = await fetch('/api/data');
                const data = await response.json();
                
                const tableBody = document.getElementById('table-body');
                tableBody.innerHTML = ''; // '불러오는 중' 글자를 지웁니다.
                
                // 가져온 데이터(배열)를 하나씩 꺼내서 표(tr, td)로 만듭니다.
                data.forEach(item => {
                    // ⭐ 핵심: content2(전화번호) 부분에 <a href="tel:번호"> 태그를 씌워줍니다!
                    const row = `<tr>
                                    <td>${item.id}</td>
                                    <td>${item.content1}</td>
                                    <td><a href="tel:${item.content2}" class="tel-link">${item.content2}</a></td>
                                 </tr>`;
                    tableBody.innerHTML += row;
                });
                
                // 만약 DB에 데이터가 하나도 없다면?
                if (data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="3">데이터가 없습니다.</td></tr>';
                }
            } catch (error) {
                document.getElementById('table-body').innerHTML = '<tr><td colspan="3">오류가 발생했습니다. ❌</td></tr>';
            }
        }
        
        // 함수 실행!
        loadData();
    </script>
</body>
</html>
