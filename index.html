<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            /* height 대신 min-height와 100dvh를 사용하여 모바일 주소창 에러 방지 */
            min-height: 100dvh; 
            margin: 0;
            padding: 20px; /* 양옆 화면에 글자가 딱 붙지 않도록 여백 추가 */
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center; /* 글자가 두 줄로 나뉘어도 가운데 정렬 유지 */
        }
        h1 {
            /* 모바일에서는 2rem, PC에서는 3rem으로 화면 크기에 따라 유연하게 변경 */
            font-size: clamp(2rem, 8vw, 3rem); 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin: 0;
            word-break: keep-all; /* 단어가 중간에 이상하게 끊기지 않도록 방지 */
            line-height: 1.4; /* 두 줄이 되었을 때 줄 간격 확보 */
        }
    </style>
</head>
<body>
    <h1>🎉 Hello World! 🌍</h1>
</body>
</html>
