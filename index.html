<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
        }
        .login-box { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            border-radius: 16px; 
            padding: 40px 30px; 
            width: 90%; 
            max-width: 400px; 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); 
        }
        h1 { 
            font-size: 2rem; 
            margin-bottom: 10px; 
            color: #2c3e50; 
            text-align: center; 
        }
        p.subtitle { 
            font-size: 0.9rem; 
            color: #666; 
            text-align: center; 
            margin-bottom: 30px; 
        }
        .input-group { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            color: #555; 
            font-weight: 600; 
        }
        input[type="password"] { 
            width: 100%; 
            padding: 12px 15px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            font-size: 1rem; 
            transition: border-color 0.3s; 
        }
        input[type="password"]:focus { 
            outline: none; 
            border-color: #667eea; 
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s; 
        }
        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); 
        }
        button:active { 
            transform: translateY(0); 
        }
        .error { 
            color: #e74c3c; 
            font-size: 0.9rem; 
            text-align: center; 
            margin-top: 15px; 
            display: none; 
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 로그인</h1>
        <p class="subtitle">비밀번호를 입력하세요</p>
        <form id="loginForm">
            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호 입력" required autofocus>
            </div>
            <button type="submit">로그인</button>
            <p class="error" id="errorMsg">❌ 비밀번호가 올바르지 않습니다.</p>
        </form>
    </div>

    <script>
        // 🔒 정답 비밀번호 (실제로는 서버에서 검증해야 함)
        const CORRECT_PASSWORD = "9cad1c9c1b66849750712f1b7ac8af57ac029b16b4cc9d8578ef255dcacb7cc9"; 

        // 이미 로그인된 상태면 바로 main.html로 이동
        if (sessionStorage.getItem("isLoggedIn") === "true") {
            window.location.href = "main.html";
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // 폼 제출 기본 동작 방지
            
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (password === CORRECT_PASSWORD) {
                // ✅ 비밀번호 맞음 → 출입증 발급
                sessionStorage.setItem("isLoggedIn", "true");
                window.location.href = "main.html";
            } else {
                // ❌ 비밀번호 틀림
                errorMsg.style.display = 'block';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });
    </script>
</body>
</html>
