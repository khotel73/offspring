<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보안 페이지</title>
    <style>
        /* 기본 여백 제거 및 모바일 최적화 설정 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh; /* 모바일 브라우저 주소창 에러 방지 */
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        
        /* 내용을 담는 반투명한 유리 상자 디자인 */
        .box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px; /* PC에서도 너무 넓어지지 않게 제한 */
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            margin-bottom: 20px;
            word-break: keep-all;
            line-height: 1.4;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        /* 입력창 디자인 */
        input[type="password"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            text-align: center;
        }

        /* 버튼 디자인 */
        button {
            width: 100%;
            padding: 15px;
            background-color: #5a6fe0;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #4a5fc0;
        }

        /* 에러 메시지 디자인 */
        #error-message {
            color: #ffcccc;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none; /* 처음에는 숨겨둠 */
        }

        /* 화면을 숨길 때 사용하는 클래스 */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- 1. 처음 보이는 암호 입력 화면 -->
    <div id="login-screen" class="box">
        <h1>🔒 비밀번호 입력</h1>
        <!-- 엔터키를 쳐도 작동하도록 onkeypress 추가 -->
        <input type="password" id="password-input" placeholder="암호를 입력하세요" onkeypress="handleKeyPress(event)">
        <button onclick="checkPassword()">확인</button>
        <p id="error-message">비밀번호가 틀렸습니다. 다시 시도해주세요.</p>
    </div>

    <!-- 2. 암호가 맞았을 때 나타나는 임시 화면 (처음엔 class="hidden"으로 숨겨져 있음) -->
    <div id="main-screen" class="box hidden">
        <h1>🎉 임시화면</h1>
        <p>환영합니다!<br>암호를 올바르게 입력하셨습니다.</p>
    </div>

        <script>
        // 우리가 설정한 진짜 암호(예: 1234) 대신, 그 암호를 변환한 '해시(Hash)값'을 저장합니다.
        // 개발자 도구를 열어도 '1234'라는 글자는 절대 보이지 않습니다.
        // (아래 해시값은 '1234'의 SHA-256 변환 값입니다)
        const PASSWORD_HASH = "9cad1c9c1b66849750712f1b7ac8af57ac029b16b4cc9d8578ef255dcacb7cc9";

        async function hashPassword(password) {
            const msgBuffer = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function checkPassword() {
            const inputElement = document.getElementById("password-input");
            const errorMessage = document.getElementById("error-message");
            const loginScreen = document.getElementById("login-screen");
            const mainScreen = document.getElementById("main-screen");

            // 사용자가 입력한 값을 동일하게 변환해 봅니다.
            const inputHash = await hashPassword(inputElement.value);

            if (inputHash === PASSWORD_HASH) {
                loginScreen.classList.add("hidden");
                mainScreen.classList.remove("hidden");
            } else {
                errorMessage.style.display = "block";
                inputElement.value = ""; 
                inputElement.focus();
            }
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                checkPassword();
            }
        }
    </script>
</body>
</html>
